<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ChrisExpress</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">ChrisExpress</div>
    <!-- Dark mode toggle button -->
    <button id="darkModeToggle" class="dark-toggle">🌙</button>
</header>

<section class="login-section">
    <div class="login-box">
        <h2>Login to ChrisExpress</h2>
        <form>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="Enter your password" required>
                <span id="togglePassword" class="toggle-password">👁️</span>
            </div>

            <button type="submit">Login</button>

            <p class="login-links">
                <a href="#">Forgot Password?</a>
            </p>
        </form>
    </div>
</section>

<script>
// ===== Password toggle =====
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', () => {
    if(passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.textContent = '🙈'; // closed eye
    } else {
        passwordInput.type = 'password';
        togglePassword.textContent = '👁️'; // open eye
    }
});

// ===== Dark mode toggle =====
const darkModeToggle = document.getElementById('darkModeToggle');
darkModeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
});
</script>

</body>
</html>
