<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ChrisExpress</title>
<link rel="stylesheet" href="style.css">
<!-- Font Awesome for eye icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">ChrisExpress</div>
    <button id="darkModeToggle" class="dark-toggle">🌙</button>
</header>

<section class="login-section">
    <div class="login-box">
        <h2>Create a New Account</h2>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="Enter your password" required>
                <span id="togglePassword" class="toggle-password">
                    <i class="fas fa-eye"></i>
                </span>
            </div>

            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm password" required>

            <button type="submit">Register</button>

            <p class="login-links">
                <a href="login-page.html">Already have an account? Login</a>
            </p>
        </form>
    </div>
</section>

<script>
// ===== Password toggle using Font Awesome =====
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');
const icon = togglePassword.querySelector('i');

togglePassword.addEventListener('click', () => {
    if(passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});

// ===== Dark mode toggle =====
const darkModeToggle = document.getElementById('darkModeToggle');
darkModeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
});
</script>

</body>
</html>
